services:
  # PostgreSQL для локальной разработки портала
  postgres:
    image: postgres:16-alpine
    container_name: portal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: portal_dev
      POSTGRES_USER: portal_dev
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal_dev -d portal_dev"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - portal_net

  # MinIO (S3-compatible) для локального хранения файлов
  minio:
    image: minio/minio:latest
    container_name: portal-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - portal_net

  # Redis для Celery (сервис протоколов)
  redis:
    image: redis:7-alpine
    container_name: portal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - portal_net

volumes:
  postgres_data:
  minio_data:
  redis_data:

networks:
  portal_net:
    name: portal_net
