services:
  postgres:
    image: postgres:16-alpine
    container_name: portal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: portal_prod
      POSTGRES_USER: portal_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal_user -d portal_prod"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - portal_net

  minio:
    image: minio/minio:latest
    container_name: portal-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - portal_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://portal_user:${POSTGRES_PASSWORD}@postgres:5432/portal_prod
      USE_MOCK_DB: "false"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ru-central-1
      S3_BUCKET: portal
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - portal_net

volumes:
  postgres_data:
  minio_data:

networks:
  portal_net:
    name: portal_net_prod
